<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f0d; --card: #111a15; --border: #1e3028;
    --green: #1a5c38; --gl: #2e8b57; --gg: #4db87a;
    --gold: #c9a84c; --goldd: #e8c96a;
    --text: #f0ece0; --muted: #7a9e88; --faint: #1e3028;
    --red: #c94040; --cut: #8b3a3a; --amber: #c88a2a;
    --white: #fff;
    --masters-green: #1a5c38;
    --masters-yellow: #f5e6a3;
    --masters-cream: #f0ece0;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; }
  .app { max-width: 1100px; margin: 0 auto; padding: 0 16px 100px; }

  /* ── Header ── */
  .hdr { text-align: center; padding: 36px 0 22px; }
  .hdr-rule { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .hdr-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .hdr-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
  .hdr-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
  .hdr h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px, 7vw, 62px); font-weight: 900; color: var(--masters-cream); letter-spacing: -1px; line-height: 1; text-shadow: 0 2px 30px rgba(201,168,76,.2); }
  .hdr h1 span { color: var(--gold); font-style: italic; }
  .hdr-sub { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2.5px; color: var(--muted); text-transform: uppercase; margin-top: 10px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 6px; margin: 18px 0 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; cursor: pointer; transition: all .2s; text-transform: uppercase; white-space: nowrap; text-align: center; }
  .tab:hover { border-color: var(--green); color: var(--gl); }
  .tab.active { background: var(--green); border-color: var(--gl); color: #fff; box-shadow: 0 0 14px rgba(61,220,82,.18); }
  .tab-date { display: block; font-size: 8px; opacity: .65; margin-top: 2px; }

  /* ── Top bar ── */
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .vtoggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .vbtn { padding: 8px 18px; background: transparent; border: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; cursor: pointer; text-transform: uppercase; transition: all .2s; }
  .vbtn.active { background: var(--green); color: #fff; }
  .vbtn + .vbtn { border-left: 1px solid var(--border); }
  .live-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .live-badge { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gg); letter-spacing: 1px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gg); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .tag { font-family: 'DM Mono', monospace; font-size: 9px; padding: 3px 8px; border-radius: 4px; }
  .tag-amber { color: var(--amber); background: rgba(212,130,10,.1); border: 1px solid rgba(212,130,10,.3); }
  .tag-red { color: var(--red); background: rgba(224,85,85,.08); border: 1px solid rgba(224,85,85,.25); }
  .tag-green { color: var(--gg); background: rgba(61,220,82,.08); border: 1px solid rgba(61,220,82,.2); }

  /* ── Leaderboard ── */
  .lb { display: flex; flex-direction: column; gap: 10px; }
  .lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color .2s; }
  .lb-card:hover { border-color: var(--green); }
  .lb-card.r1 { border-color: var(--gold); box-shadow: 0 0 22px rgba(201,162,39,.1); }
  .lb-card.r2 { border-color: #7a8a7a; }
  .lb-card.r3 { border-color: #8a6040; }
  .lb-row { display: grid; grid-template-columns: 40px 1fr 80px 80px 60px 22px; align-items: center; padding: 13px 16px; cursor: pointer; gap: 10px; }
  @media(max-width:580px) { .lb-row { grid-template-columns: 36px 1fr 68px 60px 22px; } .hide-sm { display: none; } }
  .rank { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: var(--faint); text-align: center; }
  .lb-card.r1 .rank { color: var(--gold); }
  .lb-card.r2 .rank { color: #7a8a7a; }
  .lb-card.r3 .rank { color: #8a6040; }
  .name-block { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: #fff; background: linear-gradient(135deg, var(--green), #112211); flex-shrink: 0; }
  .lb-card.r1 .avatar { background: linear-gradient(135deg, var(--gold), #7a5a08); }
  .pname { font-size: 15px; font-weight: 600; color: #fff; }
  .psub { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 1px; }
  .col { text-align: center; }
  .col-lbl { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1px; color: var(--faint); text-transform: uppercase; margin-bottom: 2px; }
  .col-val { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
  .under { color: var(--gg); } .over { color: var(--red); } .even { color: var(--muted); } .pending { color: var(--faint); }
  .chev { font-size: 11px; color: var(--faint); transition: transform .2s; user-select: none; }
  .chev.open { transform: rotate(180deg); }

  /* ── Golfer rows ── */
  .grow-wrap { border-top: 1px solid var(--border); }
  .grow-hdr { display: grid; grid-template-columns: 1fr 80px 52px 52px 52px 52px 70px; gap: 6px; padding: 7px 16px; font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1px; color: var(--faint); text-transform: uppercase; background: rgba(0,0,0,.2); }
  @media(max-width:580px) { .grow-hdr, .grow-row { grid-template-columns: 1fr 68px 40px 40px 40px 58px !important; } .r4c { display: none !important; } }
  .grow-row { display: grid; grid-template-columns: 1fr 80px 52px 52px 52px 52px 70px; align-items: center; gap: 6px; padding: 8px 16px; border-bottom: 1px solid rgba(28,46,28,.4); font-size: 13px; }
  .grow-row:last-child { border-bottom: none; }
  .grow-row.is-cut { opacity: .4; }
  .grow-row.is-best { background: rgba(42,97,50,.1); }
  .gname { color: var(--text); }
  .gsal { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .gsc { font-family: 'DM Mono', monospace; font-size: 12px; text-align: center; color: var(--text); }
  .gsc.nil { color: var(--faint); }
  .gtot { font-family: 'DM Mono', monospace; font-size: 12px; text-align: right; font-weight: 500; }
  .cut-tag { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 5px; border-radius: 3px; background: rgba(139,58,58,.2); color: var(--cut); }
  .best4-bar { display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; background: rgba(42,97,50,.07); font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); }
  .best4-val { color: var(--gl); font-size: 13px; font-weight: 500; }
  .row-actions { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .hidden-picks { padding: 18px; text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  /* ── Season table ── */
  .season-tbl { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .s-row { display: grid; grid-template-columns: 40px 1fr repeat(5, 64px) 72px; align-items: center; padding: 11px 16px; gap: 8px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 11px; }
  .s-row:last-child { border-bottom: none; }
  .s-row.s-hdr { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--faint); padding: 8px 16px; background: rgba(0,0,0,.2); }
  .s-row.r1bg { background: rgba(201,162,39,.04); }
  @media(max-width:680px) { .s-row { grid-template-columns: 36px 1fr repeat(3, 52px) 60px; } .s-hide { display: none; } }
  .sname { font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--text); }
  .scol { text-align: center; }

  /* ── Overlay / Modal ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
  .overlay.hidden { display: none; }
  .modal { background: #0b150b; border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 680px; max-height: 92vh; overflow-y: auto; padding: 26px; }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 21px; color: #fff; margin-bottom: 4px; }
  .modal-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 18px; letter-spacing: 1px; }

  /* name selector */
  .name-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 8px; margin-bottom: 16px; }
  .name-btn { padding: 12px 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: 'Crimson Pro', serif; font-size: 14px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 8px; text-align: left; }
  .name-btn:hover { border-color: var(--green); background: rgba(42,97,50,.15); }
  .name-btn.has-picks { border-color: var(--gl); }
  .ndot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
  .ndot.done { background: var(--gg); }

  /* cap bar */
  .capbar { background: rgba(0,0,0,.3); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .cap-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .cap-track { height: 3px; background: var(--faint); border-radius: 2px; margin-top: 6px; width: 180px; max-width: 100%; }
  .cap-fill { height: 3px; border-radius: 2px; background: var(--gg); transition: width .3s; }
  .cap-fill.over { background: var(--red); }
  .cap-rem { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
  .cap-rem.ok { color: var(--gg); } .cap-rem.over { color: var(--red); }

  /* chips */
  .chips-lbl { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 16px; background: rgba(42,97,50,.2); border: 1px solid var(--green); margin: 2px; font-size: 12px; color: var(--text); }
  .chip-x { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }

  /* golfer list */
  .gsearch { width: 100%; padding: 9px 12px; background: rgba(0,0,0,.3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Crimson Pro', serif; font-size: 14px; margin-bottom: 10px; outline: none; }
  .gsearch:focus { border-color: var(--green); }
  .glist { display: flex; flex-direction: column; gap: 3px; max-height: 280px; overflow-y: auto; }
  .gopt { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-radius: 7px; border: 1px solid transparent; cursor: pointer; transition: all .15s; }
  .gopt:hover:not(.dis) { background: rgba(42,97,50,.15); border-color: var(--green); }
  .gopt.sel { background: rgba(42,97,50,.25); border-color: var(--gl); }
  .gopt.dis { opacity: .3; cursor: not-allowed; }
  .gopt-name { font-size: 14px; color: var(--text); }
  .gopt-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }
  .gopt-sal { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gold); }

  /* buttons */
  .actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .btn { padding: 10px 22px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .2s; border: 1px solid; }
  .btn-p { background: var(--green); border-color: var(--gl); color: #fff; }
  .btn-p:hover { background: #3a8044; box-shadow: 0 0 14px rgba(61,220,82,.22); }
  .btn-p:disabled { opacity: .35; cursor: not-allowed; }
  .btn-s { background: transparent; border-color: var(--border); color: var(--muted); }
  .btn-s:hover { border-color: var(--muted); color: var(--text); }
  .btn-d { background: transparent; border-color: rgba(224,85,85,.4); color: var(--red); }
  .btn-d:hover { background: rgba(224,85,85,.1); }
  .btn-gold { background: var(--gold); border-color: var(--goldd); color: #000; font-weight: 500; }
  .btn-gold:hover { background: var(--goldd); }
  .btn-sm { padding: 6px 14px; font-size: 10px; }

  /* admin */
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 8px; margin-bottom: 18px; }
  .admin-card { background: rgba(0,0,0,.2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; justify-content: space-between; align-items: center; }
  .admin-card.done { border-color: var(--green); }
  .admin-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .admin-st { font-family: 'DM Mono', monospace; font-size: 9px; margin-top: 3px; }
  .admin-st.done { color: var(--gg); } .admin-st.pend { color: var(--amber); }
  .admin-edit-btn { font-family: 'DM Mono', monospace; font-size: 9px; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
  .admin-edit-btn:hover { border-color: var(--gl); color: var(--gl); }
  .panel-box { border-radius: 10px; padding: 16px; margin-top: 12px; text-align: center; }
  .panel-box h3 { font-family: 'Playfair Display', serif; font-size: 17px; margin-bottom: 6px; }
  .panel-box p { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 14px; }
  .reveal-box { background: rgba(201,162,39,.06); border: 1px solid rgba(201,162,39,.25); }
  .reveal-box h3 { color: var(--gold); }
  .lock-box { background: rgba(224,85,85,.06); border: 1px solid rgba(224,85,85,.2); }
  .lock-box h3 { color: var(--red); }
  .done-box { background: rgba(61,220,82,.05); border: 1px solid rgba(61,220,82,.2); }
  .done-box h3 { color: var(--gg); }

  /* success */
  .success-box { text-align: center; padding: 30px 20px; }
  .success-icon { font-size: 48px; margin-bottom: 12px; }
  .success-box h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gg); margin-bottom: 6px; }
  .success-box p { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; line-height: 1.6; }

  /* FAB */
  .fab { position: fixed; bottom: 22px; right: 22px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; z-index: 100; }
  .fab-btn { padding: 13px 22px; border-radius: 50px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: 1px solid; transition: all .2s; white-space: nowrap; }
  .fab-main { background: var(--green); border-color: var(--gl); color: #fff; box-shadow: 0 4px 22px rgba(61,220,82,.28); }
  .fab-main:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(61,220,82,.38); }
  .fab-admin { background: var(--card); border-color: var(--border); color: var(--muted); box-shadow: 0 2px 10px rgba(0,0,0,.4); }
  .fab-admin:hover { border-color: var(--gold); color: var(--gold); }

  /* ── Live Leaderboard ── */
  .live-wrap-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .live-wrap-hdr h2 { font-family:'Playfair Display',serif; font-size:20px; color:#fff; }
  .live-tbl { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .live-row { display:grid; grid-template-columns:44px 1fr 60px 52px 52px 52px 52px 70px; align-items:center; padding:10px 16px; gap:8px; border-bottom:1px solid rgba(28,46,28,.4); font-size:13px; }
  .live-row:last-child { border-bottom:none; }
  .live-row.live-hdr { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:1px; text-transform:uppercase; color:var(--faint); padding:8px 16px; background:rgba(0,0,0,.2); border-bottom:1px solid var(--border); }
  .live-row.is-cut-row { opacity:.45; }
  .live-row.highlight { background:rgba(201,162,39,.06); }
  @media(max-width:600px){ .live-row { grid-template-columns:36px 1fr 52px 44px 44px 44px 60px; font-size:12px; } .lv-r4 { display:none; } }
  .lv-pos { font-family:'Playfair Display',serif; font-weight:700; font-size:16px; text-align:center; color:var(--faint); }
  .lv-name { color:var(--text); font-weight:600; }
  .lv-nat { font-size:10px; color:var(--muted); }
  .lv-par { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; text-align:center; }
  .lv-sc { font-family:'DM Mono',monospace; font-size:12px; text-align:center; color:var(--text); }
  .lv-sc.nil { color:var(--faint); }
  .lv-sc.cut-score { color:var(--cut); font-style:italic; }
  .lv-tot { font-family:'DM Mono',monospace; font-size:12px; text-align:right; font-weight:500; }
  .lv-owned { font-family:'DM Mono',monospace; font-size:9px; color:var(--amber); background:rgba(212,130,10,.12); border:1px solid rgba(212,130,10,.25); border-radius:3px; padding:1px 5px; white-space:nowrap; }
  .cut-divider { text-align:center; padding:8px; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--cut); text-transform:uppercase; background:rgba(139,58,58,.08); border-top:1px solid rgba(139,58,58,.2); border-bottom:1px solid rgba(139,58,58,.2); }
  .fetch-btn { padding:9px 18px; border-radius:8px; border:1px solid var(--gl); background:var(--green); color:#fff; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px; cursor:pointer; transition:all .2s; }
  .fetch-btn:hover { background:#3a8044; }
  .fetch-btn:disabled { opacity:.4; cursor:not-allowed; }
  .in-pool-row { background: rgba(26,92,56,.12) !important; border-left: 2px solid var(--gl) !important; }
  .pool-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--gg); margin-left:5px; vertical-align:middle; }
  .owner-tag { font-family:'DM Mono',monospace; font-size:9px; color:var(--gold); margin-top:2px; }
  .live-note { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); margin-top:10px; text-align:center; letter-spacing:.5px; line-height:1.6; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--faint); border-top-color:var(--gl); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .owned-badge { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--gold); margin-left:4px; vertical-align:middle; title:"In your pool"; }


  .pin-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function effectiveScores(pick) {
  if (pick.status === "CUT") {
    const r1 = pick.scores[0] ?? null;
    const r2 = pick.scores[1] ?? null;
    if (r1 === null) return null;
    return [r1, r2 ?? 80, 80, 80];
  }
  return pick.scores;
}

function golferTotal(pick) {
  const sc = effectiveScores(pick);
  if (!sc) return null;
  const valid = sc.filter(s => s !== null);
  return valid.length ? valid.reduce((a,b)=>a+b,0) : null;
}

function best4Total(picks) {
  if (!picks || !picks.length) return null;
  const tots = picks
    .map(p => golferTotal(p))
    .filter(t => t !== null)
    .sort((a,b)=>a-b).slice(0,4);
  return tots.length ? tots.reduce((a,b)=>a+b,0) : null;
}

function fmtPar(val) {
  if (val === null || val === undefined) return "—";
  if (val === 0) return "E";
  return val > 0 ? `+${val}` : `${val}`;
}

function parClass(val) {
  if (val === null) return "pending";
  if (val < 0) return "under"; if (val > 0) return "over"; return "even";
}

function parCell(val, cls="col-val") {
  const v = val === null ? null : val - 288;
  return `<span class="${cls} ${parClass(v)}">${fmtPar(v)}</span>`;
}

function toParRaw(total) { return total === null ? null : total - 288; }

function getRanked() {
  return [...PARTICIPANTS].map(p => ({
    ...p,
    total: best4Total(state.picks[state.activeTournament]?.[p.id]),
    p_picks: state.picks[state.activeTournament]?.[p.id] ?? []
  })).sort((a,b) => {
    if (a.total===null&&b.total===null) return 0;
    if (a.total===null) return 1; if (b.total===null) return -1;
    return a.total-b.total;
  });
}

function getSeason() {
  return [...PARTICIPANTS].map(p => {
    const scores = TOURNAMENTS.map(t => best4Total(state.picks[t.id]?.[p.id]));
    const valid = scores.filter(s=>s!==null);
    return { ...p, scores, total: valid.length ? valid.reduce((a,b)=>a+b,0) : null };
  }).sort((a,b) => {
    if (a.total===null&&b.total===null) return 0;
    if (a.total===null) return 1; if (b.total===null) return -1;
    return a.total-b.total;
  });
}

function currentTournament() { return TOURNAMENTS.find(t=>t.id===state.activeTournament); }
function isRevealed() { return !!state.revealed[state.activeTournament]; }
function isLocked() { return !!state.locked[state.activeTournament]; }
function showPicks() { return isRevealed() || state.isAdmin; }
function submittedCount() { return PARTICIPANTS.filter(p=>state.picks[state.activeTournament]?.[p.id]?.length>0).length; }

}

  document.getElementById("view-live").style.display = "none";

  const show = showPicks();

      if (!isLocked()) {

      }

    return `
    <div class="lb-card${rankCls}" id="lbcard-${p.id}">

        <div class="rank">${rank}</div>

              : "No picks yet"
            }</div>

        <div class="col">

function renderGolferRows(picks) {
  if (!picks || !picks.length) return "";
  const best4Idx = new Set(
    picks.map((p,i) => ({ i, tot: golferTotal(p) ?? Infinity }))
      .sort((a,b)=>a.tot-b.tot).slice(0,4).filter(x=>x.tot!==Infinity).map(x=>x.i)
  );
  const b4 = best4Total(picks);
  const rows = picks.map((p,i) => {
    const isBest = best4Idx.has(i);
    const isCut = p.status === "CUT";
    const sc = effectiveScores(p) ?? [null,null,null,null];
    const tot = golferTotal(p);
    const scoreHtml = sc.map((s,j) => {
      const isFilled = isCut && j >= 2 && p.scores[j] === null && s === 80;
      return `<span class="gsc${s===null?" nil":""}${isFilled?" cut-score":""}${j===3?" r4c":""}">${s ?? '—'}</span>`;
    }).join("");
    return `<div class="grow-row${isCut?" is-cut":""}${isBest?" is-best":""}">
      <span class="gname">${p.golfer}</span>
      <span class="gsal">$${p.salary.toLocaleString()}</span>
      ${scoreHtml}
      <span class="gtot">${isCut ? '<span class="cut-tag">CUT</span>' : (tot ?? '—')}</span>
    </div>`;
  }).join("");
  return `<div class="grow-wrap">
    <div class="grow-hdr"><span>Golfer</span><span>Salary</span><span style="text-align:center">R1</span><span style="text-align:center">R2</span><span style="text-align:center">R3</span><span style="text-align:center" class="r4c">R4</span><span style="text-align:right">Total</span></div>
    ${rows}
    <div class="best4-bar"><span>Best 4 Score</span><span class="best4-val">${b4 ? `${b4} (${fmtPar(b4-288)})` : "—"}</span></div>
    ${picks.some(p=>p.status==="CUT") ? `<div style="padding:6px 16px 10px;font-family:'DM Mono',monospace;font-size:9px;color:var(--cut);">⚠ CUT players: R3 & R4 scored as 80</div>` : ""}
  </div>`;
}

      ${scoreCols}
      <span class="scol" style="text-align:right">${show ? parCell(p.total,'') : '<span class="pending">—</span>'}</span>

  }).join("");

// ─── PICK SELECTOR (shared) ───────────────────────────────────────────────────

function pickSelectorHTML(selected, search, cap, mode) {
  // mode: "player" | "admin"
  const used = selected.reduce((a,n)=>{const g=GOLFER_POOL.find(x=>x.name===n);return a+(g?.salary??0);},0);
  const rem = SALARY_CAP - used;
  const pct = Math.min((used/SALARY_CAP)*100,100);
  const over = rem < 0;

  const chipsHTML = selected.length ? `
    <div style="margin-bottom:12px">
      <div class="chips-lbl">Your picks (${selected.length}/6)</div>
      ${selected.map(n=>`<span class="chip">${n}<button class="chip-x" onclick="${mode}RemovePick('${n.replace(/'/g,"\\'")}')">×</button></span>`).join("")}
    </div>` : "";

  const filtered = GOLFER_POOL.filter(g=>g.name.toLowerCase().includes(search.toLowerCase()));
  const optsHTML = filtered.map(g => {
    const isSel = selected.includes(g.name);
    const cantAfford = !isSel && rem - g.salary < 0;
    const full = !isSel && selected.length >= 6;
    const dis = cantAfford || full;
    return `<div class="gopt${isSel?" sel":""}${dis?" dis":""}" onclick="${mode}TogglePick('${g.name.replace(/'/g,"\\'")}')">
      <div><div class="gopt-name">${g.name}</div><div class="gopt-sub">Avg ${g.avg} DK pts</div></div>
      <div class="gopt-sal">$${g.salary.toLocaleString()}</div>
    </div>`;
  }).join("");

  return `
    <div class="capbar">
      <div>
        <div class="cap-lbl">Salary Used &nbsp; $${used.toLocaleString()} / $50,000</div>
        <div class="cap-track"><div class="cap-fill${over?" over":""}" style="width:${pct}%"></div></div>
      </div>
      <div style="text-align:right">
        <div class="cap-lbl">Remaining</div>
        <div class="cap-rem${over?" over":" ok"}">$${rem.toLocaleString()}</div>
      </div>
    </div>
    ${chipsHTML}
    <input class="gsearch" placeholder="Search golfers…" value="${search.replace(/"/g,'&quot;')}" oninput="${mode}Search(this.value)">
    <div class="glist">${optsHTML}</div>`;
}

// ─── LIVE LEADERBOARD (ESPN) ──────────────────────────────────────────────────

// Map our tournament IDs to ESPN golf event IDs
// ESPN uses leaderboard endpoint: site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard
const ESPN_EVENT_IDS = {
  players: "401353216",  // Players Championship
  masters: "401353217",  // The Masters
  pga:     "401353218",  // PGA Championship
  us_open: "401353219",  // US Open
  open:    "401353220",  // The Open Championship
};

// Cache fetched data per tournament
let espnCache = {}; // { tId: { ts, players: [{name,pos,toPar,r1,r2,r3,r4,total,status}] } }
const CACHE_TTL = 60000; // 60 seconds

async function fetchESPN(tid) {
  // Use ESPN's public leaderboard API via a CORS-friendly proxy
  const eventId = ESPN_EVENT_IDS[tid];
  const url = `https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=${eventId}`;
  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  const res = await fetch(proxyUrl);
  if (!res.ok) throw new Error(`ESPN fetch failed: ${res.status}`);
  const data = await res.json();

  // Parse ESPN leaderboard structure
  const competitors = data?.events?.[0]?.competitions?.[0]?.competitors ?? [];
  const players = competitors.map(c => {
    const athlete = c.athlete ?? {};
    const linescores = c.linescores ?? [];
    const rounds = [null, null, null, null];
    linescores.forEach((ls, i) => {
      if (i < 4) rounds[i] = ls.value != null ? Math.round(ls.value) : null;
    });
    const statusStr = (c.status?.type?.name ?? "").toUpperCase();
    const isCut = statusStr.includes("CUT") || statusStr.includes("WD") || statusStr.includes("DQ");
    const toPar = c.score?.value ?? null;
    const total = rounds.filter(r => r !== null).reduce((a,b)=>a+b, 0) || null;
    return {
      name: athlete.displayName ?? athlete.fullName ?? "Unknown",
      pos: c.status?.position?.displayName ?? c.sortOrder ?? "—",
      toPar: toPar,
      toParDisplay: c.score?.displayValue ?? "—",
      rounds,
      total,
      status: isCut ? "CUT" : "F",
    };
  });

  return players;
}

async function loadLiveScores(forceRefresh) {
  const tid = state.activeTournament;
  const cached = espnCache[tid];
  if (!forceRefresh && cached && (Date.now() - cached.ts < CACHE_TTL)) {
    return cached.players;
  }
  const players = await fetchESPN(tid);
  espnCache[tid] = { ts: Date.now(), players };
  state.liveLastFetch = Date.now();
  // Auto-sync CUT status back into picks
  syncCutStatusFromESPN(tid, players);
  return players;
}

function syncCutStatusFromESPN(tid, espnPlayers) {
  // Update CUT status in picks based on live ESPN data
  PARTICIPANTS.forEach(p => {
    const picks = state.picks[tid]?.[p.id];
    if (!picks) return;
    picks.forEach(pick => {
      const espn = espnPlayers.find(g => namesMatch(g.name, pick.golfer));
      if (!espn) return;
      pick.status = espn.status;
      // Sync actual scores
      espn.rounds.forEach((r, i) => { if (r !== null) pick.scores[i] = r; });
    });
  });
  render(); // re-render pool tabs with updated scores
}

function namesMatch(a, b) {
  // Fuzzy match: normalize to lowercase last name + first initial
  const norm = s => s.toLowerCase().replace(/[^a-z ]/g,'').trim();
  const na = norm(a), nb = norm(b);
  if (na === nb) return true;
  // Check if last name matches
  const lastA = na.split(' ').pop(), lastB = nb.split(' ').pop();
  return lastA === lastB && lastA.length > 3;
}

function renderLiveLeaderboard() {
  document.getElementById("view-leaderboard").style.display = "none";
  document.getElementById("view-season").style.display = "none";
  document.getElementById("view-live").style.display = "";
  document.querySelectorAll(".vbtn").forEach((b,i) => b.classList.toggle("active", i===1));

  const tid = state.activeTournament;
  const t = currentTournament();

  // Build ownership map: golfer name -> array of participant initials
  const ownerMap = {};
  PARTICIPANTS.forEach(p => {
    (state.picks[tid]?.[p.id] ?? []).forEach(pick => {
      if (!ownerMap[pick.golfer]) ownerMap[pick.golfer] = [];
      ownerMap[pick.golfer].push(p.initials);
    });
  });
  const poolNames = new Set(Object.keys(ownerMap));

  const cached = espnCache[tid];

  // Loading / fetch UI
  const wrap = document.getElementById("live-lb-wrap");

  const headerBar = `
    <div class="live-wrap-hdr">
      <div>
        <h2>📡 Live Leaderboard</h2>
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px;">${t.name} · Pool golfers highlighted</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        ${state.liveLastFetch ? `<span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);">Updated ${new Date(state.liveLastFetch).toLocaleTimeString()}</span>` : ""}
        <button class="fetch-btn" id="refresh-btn" onclick="triggerLiveFetch(true)">↻ Refresh</button>
      </div>
    </div>`;

  if (!cached) {
    wrap.innerHTML = headerBar + `
      <div class="live-tbl" style="padding:50px;text-align:center;">
        <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:18px;">
          <span class="spinner"></span>Fetching live scores from ESPN…
        </div>
      </div>`;
    triggerLiveFetch(false);
    return;
  }

  const allPlayers = cached.players;
  // Separate pool players from field, then show full leaderboard with pool highlighted
  const active = allPlayers.filter(g => g.status !== "CUT");
  const cut = allPlayers.filter(g => g.status === "CUT");

  function liveRow(g, isCut) {
    const inPool = [...poolNames].some(n => namesMatch(n, g.name));
    const owners = inPool ? [...poolNames].filter(n => namesMatch(n, g.name)).flatMap(n => ownerMap[n]) : [];
    const rounds = g.rounds ?? [null,null,null,null];
    const scoreHtml = rounds.map((s,j) => {
      const isFilled = isCut && j >= 2 && s === null;
      const displayVal = isCut && j >= 2 && s === null ? "80*" : (s ?? "—");
      return `<span class="lv-sc${s===null&&!isFilled?" nil":""}${isFilled?" cut-score":""}${j===3?" lv-r4":""}">${displayVal}</span>`;
    }).join("");

    const parDisp = g.toParDisplay ?? "—";
    const parNum = g.toPar;
    const parCls = parNum === null ? "pending" : (parNum < 0 ? "under" : parNum > 0 ? "over" : "even");
    const posStyle = ["1","2","3","T1"].includes(String(g.pos)) ? `color:var(--gold);font-weight:700;` : "";

    return `<div class="live-row${isCut?" is-cut-row":""}${inPool?" in-pool-row":""}">
      <span class="lv-pos" style="${posStyle}">${g.pos}</span>
      <div>
        <div class="lv-name">${g.name}${inPool?'<span class="pool-dot" title="In your pool"></span>':''}</div>
        ${inPool ? `<div class="owner-tag">📋 ${owners.join(", ")}</div>` : '<div class="owner-tag" style="color:transparent">·</div>'}
      </div>
      <span class="lv-par ${parCls}">${parDisp}</span>
      ${scoreHtml}
      <span class="lv-tot">${g.total || "—"}</span>
    </div>`;
  }

  const activeRows = active.map(g => liveRow(g, false)).join("");
  const cutRows = cut.map(g => liveRow(g, true)).join("");
  const cutDivider = cut.length ? `<div class="cut-divider">✂ Missed Cut — Pool players scored 80 for R3 & R4</div>` : "";

  wrap.innerHTML = headerBar + `
    <div class="live-tbl">
      <div class="live-row live-hdr">
        <span>POS</span><span>Player</span><span style="text-align:center">PAR</span>
        <span style="text-align:center">R1</span><span style="text-align:center">R2</span>
        <span style="text-align:center">R3</span><span style="text-align:center" class="lv-r4">R4</span>
        <span style="text-align:right">TOT</span>
      </div>
      ${activeRows}
      ${cutDivider}
      ${cutRows}
    </div>
    <div class="live-note">
      Pool participants highlighted in green · 80* = CUT penalty score<br>
      Auto-refreshes every 60 seconds during tournament rounds
    </div>`;

  // Auto-refresh timer
  if (!window._liveTimer) {
    window._liveTimer = setInterval(() => {
      if (state.view === "live") triggerLiveFetch(true);
    }, CACHE_TTL);
  }
}

async function triggerLiveFetch(force) {
  const btn = document.getElementById("refresh-btn");
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Loading…'; }
  try {
    await loadLiveScores(force);
    renderLiveLeaderboard();
  } catch(err) {
    const wrap = document.getElementById("live-lb-wrap");
    const t = currentTournament();
    if (wrap) wrap.innerHTML += `
      <div style="background:rgba(201,64,64,.1);border:1px solid rgba(201,64,64,.3);border-radius:8px;padding:14px 16px;margin-top:12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--red);">
        ⚠ Could not load live scores. ESPN may be unavailable or the tournament hasn't started yet.<br>
        <span style="color:var(--muted);margin-top:4px;display:block;">Error: ${err.message}</span>
        <button class="fetch-btn" style="margin-top:10px" onclick="triggerLiveFetch(true)">Try Again</button>
      </div>`;
  }
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────

function setTournament(id) {
  state.activeTournament = id;
  state.expanded = null;
  render();
}

function setView(v) {
  state.view = v;
  // hide all views first
  ["leaderboard","live","season"].forEach(id => {
    document.getElementById("view-"+id).style.display = "none";
  });
  document.querySelectorAll(".vbtn").forEach((b,i) => b.classList.remove("active"));
  render();
}

function toggleExpand(id) {
  state.expanded = state.expanded === id ? null : id;
  render();
}

function showModal(id) { document.getElementById(id).classList.remove("hidden"); }
function closeModal(id) { document.getElementById(id).classList.add("hidden"); }

// Close overlay on backdrop click
document.querySelectorAll(".overlay").forEach(el => {
  el.addEventListener("click", e => { if (e.target === el) el.classList.add("hidden"); });
});

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────

const STORAGE_KEY = "pga_pool_2026";

function saveToStorage() {
  try {
    const data = {
      picks: state.picks,
      pins: state.pins,
      revealed: state.revealed,
      locked: state.locked,
      participants: PARTICIPANTS,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {
    console.warn("Could not save to localStorage:", e);
  }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.picks)    state.picks    = data.picks;
    if (data.pins)     state.pins     = data.pins;
    if (data.revealed) state.revealed = data.revealed;
    if (data.locked)   state.locked   = data.locked;
    if (data.participants && Array.isArray(data.participants) && data.participants.length > 0) {
      PARTICIPANTS.length = 0;
      data.participants.forEach(p => PARTICIPANTS.push(p));
    }
  } catch(e) {
    console.warn("Could not load from localStorage:", e);
  }
}
